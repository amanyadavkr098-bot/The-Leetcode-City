name: PR Closed Handler

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  handle-unmerged-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == false

    steps:
      - name: Reopen, Unassign, and Unlock Linked Issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            
            // Ignore bot closures to prevent redundant runs or API calls
            if (pr.user.login.includes('[bot]') || context.actor === 'github-actions[bot]') {
              core.info('PR closed by a bot, skipping duplicate cleanup in this workflow.');
              return;
            }

            const prNumber = pr.number;
            const prAuthor = pr.user.login;
            const prBody = pr.body ?? '';

            // Parse linked issue numbers from the PR body
            const cleanBody = prBody.replace(/<!--[\s\S]*?-->/g, '');
            const BLOCK_REGEX = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)(?:\s*(?:and|,)?\s*#\d+)+/gi;
            const issueNumbers = [];
            let blockMatch;
            while ((blockMatch = BLOCK_REGEX.exec(cleanBody)) !== null) {
              const numRegex = /#(\d+)/g;
              let numMatch;
              while ((numMatch = numRegex.exec(blockMatch[0])) !== null) {
                issueNumbers.push(parseInt(numMatch[1], 10));
              }
            }
            const uniqueIssueNumbers = [...new Set(issueNumbers)];

            for (const issueNumber of uniqueIssueNumbers) {
              try {
                // 1. Fetch issue to get assignees & lock status
                const { data: issueData } = await github.rest.issues.get({
                  owner, repo, issue_number: issueNumber
                });
                
                // 2. Unassign assignees
                const assignees = issueData.assignees.map(a => a.login);
                if (assignees.length > 0) {
                  await github.rest.issues.removeAssignees({
                    owner, repo, issue_number: issueNumber,
                    assignees
                  });
                  core.info(`Unassigned ${assignees.join(', ')} from issue #${issueNumber}`);
                }

                // 3. Unlock conversation
                if (issueData.locked) {
                  await github.rest.issues.unlock({
                    owner, repo, issue_number: issueNumber
                  });
                  core.info(`Unlocked conversation for issue #${issueNumber}`);
                }

                // 4. Reopen the issue (ensure it is open)
                await github.rest.issues.update({
                  owner, repo, issue_number: issueNumber,
                  state: 'open'
                });

                // 5. Post comment explaining reopening
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `🔄 **This issue has been reopened, unassigned, and unlocked.**\n\nThe associated Pull Request #${prNumber} by @${prAuthor} was closed without being merged.\n\n🟢 **This issue is now available for other contributors!** If you'd like to work on it, please comment here to claim it. 🚀`
                });

                core.info(`Reopened, unassigned, and unlocked linked issue #${issueNumber}`);
              } catch (err) {
                core.error(`Failed to update linked issue #${issueNumber}: ${err.message}`);
              }
            }
